<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">

<h2>Lista de tareas</h2>

<a href="/crear/" class="btn btn-success mb-3">
Nueva tarea
</a>

<table class="table table-striped">

<thead>
<tr>
<th>Actividad</th>
<th>Descripción</th>
<th>Fecha</th>
<th>Hora</th>
</tr>
</thead>

<tbody>
{% for tarea in tareas %}
<tr>
<td>{{ tarea.nombre }}</td>
<td>{{ tarea.descripcion }}</td>
<td>{{ tarea.fecha }}</td>
<td>{{ tarea.hora }}</td>
</tr>
{% endfor %}
</tbody>

</table>

</div>

</body>
</html>
